<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Management - Case Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .nav-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 24px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .nav-link:hover {
            transform: scale(1.05);
        }

        .upload-zone {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            background: #f8f9ff;
            transition: all 0.3s;
            cursor: pointer;
        }

        .upload-zone:hover, .upload-zone.dragover {
            background: #eef1ff;
            border-color: #764ba2;
        }

        .upload-zone p {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .upload-zone small {
            color: #999;
            font-size: 14px;
        }

        .file-input {
            display: none;
        }

        .progress-container {
            margin-bottom: 30px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .progress-message {
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .documents-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }

        .documents-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        .documents-table th:first-child {
            border-radius: 12px 0 0 0;
        }

        .documents-table th:last-child {
            border-radius: 0 12px 0 0;
        }

        .documents-table td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .documents-table tr:hover {
            background: #f8f9ff;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-processing {
            background: #fff3cd;
            color: #856404;
        }

        .status-ready {
            background: #d4edda;
            color: #155724;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-refresh {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-bottom: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Document Management</h1>
            <p>Upload and manage documents for RAG-enabled conversations</p>
            <a href="index.html" class="nav-link">Back to Chat</a>
        </div>

        <div class="upload-zone" id="uploadZone">
            <p>Drag and drop files here or click to upload</p>
            <small>Supports PDF, TXT, and DOCX files up to 50MB</small>
            <input type="file" class="file-input" id="fileInput" accept=".pdf,.txt,.docx">
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>
            <div class="progress-message" id="progressMessage">Initializing...</div>
        </div>

        <button class="btn btn-refresh" onclick="loadDocuments()">Refresh Documents</button>

        <div id="documentsList">
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z"/>
                </svg>
                <p>No documents uploaded yet</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:7777';
        let uploadedFiles = [];

        // Upload zone drag and drop
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');

        uploadZone.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        async function handleFiles(files) {
            for (const file of files) {
                await uploadFile(file);
            }
        }

        async function uploadFile(file) {
            // Validate file type
            const validTypes = ['.pdf', '.txt', '.docx'];
            const fileExt = '.' + file.name.split('.').pop().toLowerCase();

            if (!validTypes.includes(fileExt)) {
                alert('Invalid file type. Please upload PDF, TXT, or DOCX files.');
                return;
            }

            // Validate file size (50MB)
            if (file.size > 50 * 1024 * 1024) {
                alert('File too large. Maximum size is 50MB.');
                return;
            }

            // Show progress
            const progressContainer = document.getElementById('progressContainer');
            const progressFill = document.getElementById('progressFill');
            const progressMessage = document.getElementById('progressMessage');

            progressContainer.style.display = 'block';
            progressFill.style.width = '0%';
            progressFill.textContent = '0%';
            progressMessage.textContent = 'Uploading...';

            try {
                const formData = new FormData();
                formData.append('file', file);

                const response = await fetch(`${API_BASE}/api/documents/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`Upload failed: ${response.statusText}`);
                }

                const result = await response.json();

                // Simulate progress (in real implementation, use WebSocket)
                progressFill.style.width = '100%';
                progressFill.textContent = '100%';
                progressMessage.textContent = 'Upload complete!';

                // Refresh document list
                setTimeout(() => {
                    progressContainer.style.display = 'none';
                    loadDocuments();
                }, 2000);

            } catch (error) {
                console.error('Upload error:', error);
                progressMessage.textContent = 'Upload failed: ' + error.message;
            }
        }

        async function loadDocuments() {
            try {
                const response = await fetch(`${API_BASE}/api/documents`);

                if (!response.ok) {
                    throw new Error('Failed to load documents');
                }

                const data = await response.json();
                displayDocuments(data.documents);

            } catch (error) {
                console.error('Load error:', error);
            }
        }

        function displayDocuments(documents) {
            const container = document.getElementById('documentsList');

            if (!documents || documents.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z"/>
                        </svg>
                        <p>No documents uploaded yet</p>
                    </div>
                `;
                return;
            }

            let html = '<table class="documents-table">';
            html += `
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Size</th>
                        <th>Upload Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
            `;

            documents.forEach(doc => {
                const statusClass = `status-${doc.status}`;
                const fileSize = formatFileSize(doc.file_size);
                const uploadDate = new Date(doc.upload_timestamp).toLocaleDateString();

                html += `
                    <tr>
                        <td>${doc.filename}</td>
                        <td>${doc.file_type.toUpperCase()}</td>
                        <td>${fileSize}</td>
                        <td>${uploadDate}</td>
                        <td><span class="status-badge ${statusClass}">${doc.status}</span></td>
                        <td><button class="btn btn-delete" onclick="deleteDocument('${doc.document_id}')">Delete</button></td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        async function deleteDocument(documentId) {
            if (!confirm('Are you sure you want to delete this document?')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/documents/${documentId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    throw new Error('Delete failed');
                }

                loadDocuments();

            } catch (error) {
                console.error('Delete error:', error);
                alert('Failed to delete document');
            }
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // Load documents on page load
        loadDocuments();
    </script>
</body>
</html>
