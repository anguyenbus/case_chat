<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Case Chat - Local Agent UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 80vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .rag-toggle-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .rag-toggle {
            position: relative;
            width: 50px;
            height: 26px;
        }

        .rag-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.3);
            transition: .4s;
            border-radius: 26px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #4caf50;
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .rag-label {
            font-size: 14px;
            font-weight: 600;
        }

        .rag-status {
            font-size: 12px;
            opacity: 0.8;
        }

        .documents-link {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .documents-link:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message-user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message-agent {
            align-self: flex-start;
            background: #f0f0f0;
            color: #333;
        }

        .message-content pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message-content code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }

        .citations {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #ddd;
        }

        .citation {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin: 2px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .citation:hover {
            background: #bbdefb;
        }

        .chat-input-container {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .send-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .send-button:hover {
            transform: scale(1.05);
        }

        .send-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loading-dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .status-connected {
            background: #4caf50;
            color: white;
        }

        .status-disconnected {
            background: #f44336;
            color: white;
        }

        .rag-indicator {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .rag-enabled {
            background: #4caf50;
            color: white;
        }

        .rag-disabled {
            background: #9e9e9e;
            color: white;
        }

        .chunks-header {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .chunks-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        .chunk-item {
            background: #f0f4ff;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .chunk-item:hover {
            background: #e0e7ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
            border-color: #764ba2;
        }

        .chunk-title {
            font-weight: 700;
            color: #667eea;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .chunk-meta {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .chunk-preview {
            font-size: 12px;
            color: #333;
            line-height: 1.5;
            font-style: italic;
            background: rgba(255, 255, 255, 0.6);
            padding: 8px;
            border-radius: 4px;
            border-left: 3px solid #667eea;
        }

        .streaming-response {
            position: relative;
        }

        .cursor {
            animation: blink 1s infinite;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>Case Chat <span id="status" class="status-badge status-disconnected">Disconnected</span></h1>
            <p>HR Legal Case Analysis Assistant - GLM-5 Model</p>

            <div class="rag-toggle-container">
                <label class="rag-toggle">
                    <input type="checkbox" id="ragToggle" checked onchange="toggleRAG()">
                    <span class="slider"></span>
                </label>
                <span class="rag-label">Enable Document Search (RAG)</span>
                <span id="ragIndicator" class="rag-indicator rag-enabled">ON</span>
            </div>

            <a href="documents.html" class="documents-link">Manage Documents</a>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message message-agent">
                <div class="message-content">
                    Hello! I'm your legal tax case analysis assistant. How can I help you today?
                </div>
            </div>
        </div>

        <div class="chat-input-container">
            <input
                type="text"
                class="chat-input"
                id="chatInput"
                placeholder="Type your message..."
                onkeypress="if(event.key === 'Enter') sendMessage()"
            >
            <button class="send-button" onclick="sendMessage()" id="sendButton">Send</button>
        </div>
    </div>

    <script>
        // Cache buster - force reload on page update
        const PAGE_VERSION = '2026-03-18-20:25-v5-rag-debug';
        console.log('[PAGE VERSION]', PAGE_VERSION, 'Loading with RAG debugging...');

        const API_BASE = 'http://localhost:7777';
        const AGENT_ID = 'case-chat-assistant';
        let sessionId = 'local-session-' + Date.now();
        let ragEnabled = true;

        // Check connection status
        async function checkConnection() {
            try {
                console.log('[CONNECT] Checking connection to', `${API_BASE}/health`);
                const response = await fetch(`${API_BASE}/health`);
                console.log('[CONNECT] Response status:', response.status, 'ok:', response.ok);
                if (response.ok) {
                    document.getElementById('status').className = 'status-badge status-connected';
                    document.getElementById('status').textContent = 'Connected';
                    console.log('[CONNECT] ✓ Connected!');
                }
            } catch (error) {
                console.error('[CONNECT] ✗ Connection failed:', error);
                document.getElementById('status').className = 'status-badge status-disconnected';
                document.getElementById('status').textContent = 'Disconnected';
            }
        }

        // Toggle RAG
        function toggleRAG() {
            ragEnabled = document.getElementById('ragToggle').checked;
            const indicator = document.getElementById('ragIndicator');

            if (ragEnabled) {
                indicator.className = 'rag-indicator rag-enabled';
                indicator.textContent = 'ON';
            } else {
                indicator.className = 'rag-indicator rag-disabled';
                indicator.textContent = 'OFF';
            }
        }

        // Search documents for RAG
        async function searchDocuments(query) {
            try {
                const response = await fetch(`${API_BASE}/api/documents/search`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        query: query,
                        top_k: 5
                    })
                });

                if (!response.ok) {
                    return null;
                }

                const data = await response.json();
                return data.results || [];

            } catch (error) {
                console.error('Search error:', error);
                return null;
            }
        }

        // Format citations
        function formatCitations(results) {
            if (!results || results.length === 0) {
                return '';
            }

            let citationsHtml = '<div class="citations"><strong>Sources:</strong> ';

            results.forEach((result, index) => {
                const relevance = Math.round(result.relevance_score * 100);
                citationsHtml += `<span class="citation" onclick="showCitation(${index})">[${result.document_id} - ${relevance}%]</span>`;
            });

            citationsHtml += '</div>';
            return citationsHtml;
        }

        // Show citation details
        function showCitation(index) {
            // In a full implementation, this would show a modal with chunk details
            alert('Citation details would be shown here in a full implementation.');
        }

        // Send message to agent with streaming support
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const sendButton = document.getElementById('sendButton');
            const chatMessages = document.getElementById('chatMessages');

            const message = input.value.trim();
            if (!message) return;

            // Add user message to chat
            addMessage(message, 'user');
            input.value = '';
            sendButton.disabled = true;

            let searchResults = null;
            let ragContextMessage = message; // Original message for context

            // Search documents if RAG is enabled
            if (ragEnabled) {
                console.log('[RAG] Searching documents for:', message);

                // Show searching indicator
                const searchDiv = document.createElement('div');
                searchDiv.className = 'message message-agent';
                searchDiv.innerHTML = '<div class="message-content">🔍 Searching documents...</div>';
                searchDiv.id = 'rag-status';
                chatMessages.appendChild(searchDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;

                searchResults = await searchDocuments(message);
                console.log('[RAG] Search results:', searchResults);

                // Remove searching indicator
                const searchStatus = document.getElementById('rag-status');
                if (searchStatus) searchStatus.remove();

                if (searchResults && searchResults.length > 0) {
                    console.log('[RAG] Found', searchResults.length, 'relevant chunks');

                    // Display chunks used BEFORE the response
                    const chunksDiv = document.createElement('div');
                    chunksDiv.className = 'message message-agent';
                    chunksDiv.innerHTML = `
                        <div class="message-content">
                            <div class="chunks-header">📚 Using ${searchResults.length} document chunks:</div>
                            <div class="chunks-list">
                                ${searchResults.map((result, index) => {
                                    const relevance = Math.round(result.relevance_score * 100);
                                    const cleanText = result.text.substring(0, 150).replace(/\n/g, ' ');
                                    return `
                                        <div class="chunk-item" onclick="showChunkDetails(${index})">
                                            <div class="chunk-title">📄 Chunk #${index + 1}</div>
                                            <div class="chunk-meta">${result.document_id} • ${relevance}% match</div>
                                            <div class="chunk-preview">"${cleanText}..."</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                    chunksDiv.id = 'chunks-display';
                    chatMessages.appendChild(chunksDiv);
                    chatMessages.scrollTop = chatMessages.scrollHeight;

                    // Build context for the AI
                    ragContextMessage = message + '\n\nRelevant document context:\n';
                    searchResults.forEach((result, index) => {
                        ragContextMessage += `[${index + 1}] ${result.text}\n`;
                    });
                } else {
                    // Show that RAG is enabled but no results found
                    const noRagDiv = document.createElement('div');
                    noRagDiv.className = 'message message-agent';
                    noRagDiv.innerHTML = '<div class="message-content" style="opacity: 0.7;">📚 Document search enabled - No relevant chunks found</div>';
                    noRagDiv.id = 'no-rag-results';
                    chatMessages.appendChild(noRagDiv);
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            }

            // Create placeholder for streaming response
            const responseDiv = document.createElement('div');
            responseDiv.className = 'message message-agent';
            responseDiv.innerHTML = '<div class="message-content streaming-response"><span class="streaming-text"></span><span class="cursor">▋</span></div>';
            responseDiv.id = 'streaming-response';
            chatMessages.appendChild(responseDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                // Call AgentOS API without streaming to avoid duplication
                const formData = new FormData();
                formData.append('message', ragContextMessage);  // Use ragContextMessage with document context
                formData.append('user_id', sessionId);

                const response = await fetch(`${API_BASE}/agents/${AGENT_ID}/runs`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // Read the response as text (AgentOS sends SSE format)
                const responseText = await response.text();
                console.log('[DEBUG] Response received, length:', responseText.length);

                // Parse SSE format to extract the actual content
                // AgentOS sends lines like: "data: {"content": "..."}"
                let lastContent = '';
                let runCount = 0;
                const lines = responseText.split('\n');

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6).trim(); // Remove "data: " prefix
                        if (!data || data === '[DONE]') continue;

                        try {
                            const parsed = JSON.parse(data);
                            runCount++;
                            console.log('[PARSE] Run #' + runCount, 'Keys:', Object.keys(parsed));

                            // Take the last content we find (fixes duplication)
                            if (parsed.content) {
                                lastContent = parsed.content;
                            } else if (parsed.response) {
                                lastContent = parsed.response;
                            }
                        } catch (e) {
                            console.warn('[PARSE] Failed to parse line:', data.substring(0, 100), e);
                        }
                    }
                }

                console.log('[FINAL] Total runs detected:', runCount, 'Content length:', lastContent.length);

                // Display the response
                const responseDiv = document.getElementById('streaming-response');
                if (responseDiv) {
                    const contentDiv = responseDiv.querySelector('.message-content');
                    if (contentDiv) {
                        contentDiv.textContent = lastContent || 'No response content';
                    }
                }

            } catch (error) {
                console.error('Error:', error);
                const responseDiv = document.getElementById('streaming-response');
                if (responseDiv) {
                    responseDiv.innerHTML = `<div class="message-content">Error: ${error.message}. Make sure the AgentOS backend is running on port 7777.</div>`;
                }
            } finally {
                sendButton.disabled = false;
                input.focus();
            }
        }

        // Store search results globally for citation display
        let globalSearchResults = [];

        // Override searchDocuments to store results globally
        const originalSearchDocuments = searchDocuments;
        searchDocuments = async function(query) {
            const results = await originalSearchDocuments(query);
            globalSearchResults = results || [];
            return results;
        }

        // Show chunk details
        function showChunkDetails(index) {
            const result = globalSearchResults[index];
            if (!result) return;

            alert(`Document: ${result.document_id}\n\nChunk Content:\n${result.text}\n\nRelevance: ${Math.round(result.relevance_score * 100)}%`);
        }

        function addMessage(content, type) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${type}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            // Simple markdown-like parsing
            let formattedContent = content
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`(.*?)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');

            contentDiv.innerHTML = formattedContent;
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Check connection on load
        checkConnection();
        setInterval(checkConnection, 5000);

        // Focus input on load
        document.getElementById('chatInput').focus();
    </script>
</body>
</html>
